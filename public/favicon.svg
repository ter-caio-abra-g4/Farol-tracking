<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Feixe de luz (atrás de tudo) -->
  <path d="M24 14 L44 4 L46 10 L26 17 Z" fill="url(#beam)" opacity="0.55"/>

  <!-- Base do farol -->
  <rect x="18" y="38" width="12" height="5" rx="2" fill="#B9915B"/>

  <!-- Torre — corpo principal -->
  <rect x="20" y="18" width="8" height="21" fill="#F5F4F3"/>

  <!-- Listras da torre -->
  <rect x="20" y="21" width="8" height="3" fill="#B9915B" opacity="0.7"/>
  <rect x="20" y="27" width="8" height="3" fill="#B9915B" opacity="0.7"/>
  <rect x="20" y="33" width="8" height="3" fill="#B9915B" opacity="0.7"/>

  <!-- Varanda / galeria (plataforma ao redor da lanterna) -->
  <rect x="18" y="16" width="12" height="2.5" rx="1" fill="#B9915B"/>

  <!-- Câmara da lanterna -->
  <rect x="20.5" y="10" width="7" height="6" rx="1" fill="#001F35" stroke="#B9915B" stroke-width="0.8"/>

  <!-- Vidro da lanterna (brilho) -->
  <rect x="21.5" y="11" width="2" height="4" rx="0.5" fill="#E8C17A" opacity="0.6"/>
  <rect x="24.5" y="11" width="2" height="4" rx="0.5" fill="#E8C17A" opacity="0.35"/>

  <!-- Dome / cúpula do topo -->
  <path d="M20.5 10 Q24 5.5 27.5 10 Z" fill="#B9915B"/>

  <!-- Ponta (raio) -->
  <line x1="24" y1="6" x2="24" y2="4" stroke="#E8C17A" stroke-width="1.2" stroke-linecap="round"/>

  <defs>
    <linearGradient id="beam" x1="24" y1="14" x2="46" y2="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8C17A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8C17A" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
